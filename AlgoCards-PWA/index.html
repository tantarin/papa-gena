<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest.json">
<title>AlgoCards</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#252540;--purple:#7c3aed;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--text:#e2e8f0;--dim:#94a3b8;--radius:16px;--accent:var(--purple);--accent-soft:rgba(124,58,237,0.25)}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-top:env(safe-area-inset-top,16px);-webkit-user-select:none;user-select:none}
h1{font-size:26px;margin:8px 0 4px;text-align:center}
.subtitle{text-align:center;color:var(--dim);font-size:13px;margin-bottom:14px}
.flashcard{background:radial-gradient(circle at 20% 0%, var(--accent-soft), var(--card) 55%);border-radius:20px;padding:24px;margin:12px 0;cursor:pointer;position:relative;overflow:hidden;touch-action:pan-y}
.fc-face{display:none}
.fc-face.visible{display:block}
.fc-nav{display:flex;justify-content:center;gap:24px;margin-top:12px}
.fc-nav button{background:var(--card);border:none;color:var(--purple);width:52px;height:52px;border-radius:50%;font-size:22px;cursor:pointer;transition:transform .1s}
.fc-nav button:active{transform:scale(.9)}
.counter{text-align:center;color:var(--dim);font-size:13px;margin:8px 0}
.counter-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px 16px;margin:8px 0}
.counter-row .counter{margin:0}
.counter-nav-cluster{display:inline-flex;align-items:center;gap:6px;flex-shrink:0}
.shuffle-mini{background:transparent;border:1px solid #ffffff15;color:var(--dim);width:34px;height:34px;border-radius:12px;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;opacity:.9}
.shuffle-mini:active{background:rgba(124,58,237,0.28);color:#fff;border-color:var(--purple);transform:scale(.98)}
.shuffle-mini:focus{outline:none;box-shadow:0 0 0 2px rgba(124,58,237,.25)}
.tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:8px;font-weight:600}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
#search{width:100%;padding:10px 14px;border-radius:12px;border:1px solid #ffffff15;background:var(--card);color:var(--text);font-size:15px;outline:none;margin-bottom:8px}
#search::placeholder{color:var(--dim)}
#search:focus{border-color:var(--purple)}
.spoiler-row{margin-top:12px}
.hint-btn{background:var(--card2);border:none;color:var(--orange);padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;display:inline-block}
.steps-btn{color:var(--green)}
.hint-text{margin-top:8px;color:var(--orange);font-size:14px;font-weight:600}
.steps-text{margin-top:8px;color:var(--green);font-size:13px;line-height:1.7;white-space:pre-wrap}
.hl{color:var(--orange);font-weight:600;background:rgba(245,158,11,0.15);padding:1px 4px;border-radius:4px}
.filter-btn{background:var(--card);border:1px solid #ffffff15;color:var(--dim);padding:6px 12px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;transition:.2s}
.filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
pre code.hljs{background:var(--card2);padding:12px;border-radius:10px}
pre,pre *{-webkit-user-select:text;user-select:text;cursor:text}
.code-wrap{position:relative;margin-top:10px}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(124,58,237,0.2);border:none;color:#a78bfa;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;z-index:1;transition:.2s;box-shadow:0 0 10px rgba(124,58,237,0.2)}
.copy-btn:hover{background:rgba(124,58,237,0.35);box-shadow:0 0 14px rgba(124,58,237,0.4)}
.copy-btn:active{background:var(--purple);color:#fff;transform:scale(0.95)}
.copy-btn.copied{background:rgba(34,197,94,0.25);color:#4ade80;box-shadow:0 0 10px rgba(34,197,94,0.3)}
.enter-btn-inline{position:absolute;top:34px;right:8px;background:var(--card);border:1px solid #ffffff20;color:var(--dim);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;z-index:1;transition:.2s}
.enter-btn-inline:active{background:var(--purple);color:#fff}
.enter-btn-inline{min-width:72px;text-align:center;line-height:1}
.enter-btn-inline.active{box-shadow:0 0 0 2px rgba(124,58,237,.25)}
.mascot-layer{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.fly-overlay{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.peek-cat{position:fixed;z-index:400;pointer-events:none;transition:transform .8s cubic-bezier(.34,1.56,.64,1);font-size:40px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.peek-cat.from-right{right:-50px;bottom:15%;transform:translateX(0)}
.peek-cat.from-right.visible{transform:translateX(-45px)}
.peek-cat.from-left{left:-50px;bottom:25%;transform:translateX(0) scaleX(-1)}
.peek-cat.from-left.visible{transform:translateX(45px) scaleX(-1)}
.peek-cat.from-bottom{bottom:-45px;right:20%;transform:translateY(0)}
.peek-cat.from-bottom.visible{transform:translateY(-40px)}
.peek-cat-face{display:block;line-height:1}
.peek-cat-paws{display:block;font-size:24px;text-align:center;margin-top:-8px}
.fish{position:fixed;pointer-events:none;z-index:50;font-size:var(--fish-size,28px);opacity:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.2))}
@keyframes fishSwimLR{0%{opacity:0;transform:translateX(0) translateY(0) scaleX(1)}8%{opacity:1}50%{transform:translateX(var(--swim-x,40vw)) translateY(var(--swim-y,0px)) scaleX(1)}100%{opacity:0;transform:translateX(var(--swim-x2,80vw)) translateY(var(--swim-y2,20px)) scaleX(1)}}
@keyframes fishSwimRL{0%{opacity:0;transform:translateX(0) translateY(0) scaleX(-1)}8%{opacity:1}50%{transform:translateX(var(--swim-x,-40vw)) translateY(var(--swim-y,0px)) scaleX(-1)}100%{opacity:0;transform:translateX(var(--swim-x2,-80vw)) translateY(var(--swim-y2,20px)) scaleX(-1)}}
@keyframes fishBob{0%,100%{margin-top:0}50%{margin-top:var(--bob,6px)}}
.mascot{position:absolute;will-change:transform,opacity;filter:drop-shadow(0 6px 10px rgba(0,0,0,.45));user-select:none;font-size:30px;opacity:.95}
.mascot-bird{animation:mascotBird 2.8s ease-in-out both}
.mascot-butterfly{animation:mascotButterfly 3.2s linear both}
.mascot-cat{animation:mascotCat 3.6s ease-in-out both}

@keyframes mascotBird{
  0%{opacity:0;transform:translate(var(--x),var(--y)) scale(.75) rotate(-8deg)}
  10%{opacity:1}
  100%{opacity:0;transform:translate(calc(var(--x) + var(--dx)),calc(var(--y) + var(--dy))) scale(1.15) rotate(10deg)}
}
@keyframes mascotButterfly{
  0%{opacity:0;transform:translate(var(--x),var(--y)) scale(.70) rotate(0deg)}
  10%{opacity:1}
  100%{opacity:0;transform:translate(calc(var(--x) + var(--dx)),calc(var(--y) + var(--dy))) scale(1.20) rotate(12deg)}
}
@keyframes mascotCat{
  0%{opacity:0;transform:translate(var(--x),var(--y)) scale(.75)}
  12%{opacity:1}
  30%{transform:translate(calc(var(--x) + var(--dx)),var(--y)) scale(1.25)}
  60%{transform:translate(calc(var(--x) + var(--dx2)),var(--y)) scale(1.05)}
  100%{opacity:0;transform:translate(calc(var(--x) + var(--dx2)),var(--y)) scale(.95)}
}

/* Интерактив 5: "пузырьки" во время ввода решения */
.typing-bubble{
  position:absolute;
  left:0;
  top:0;
  pointer-events:none;
  user-select:none;
  will-change:transform,opacity;
  opacity:.95;
  font-size:18px;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));
  animation:bubbleRise 1200ms ease-out both;
}
@keyframes bubbleRise{
  0%{opacity:0;transform:translate(0,0) scale(.8)}
  12%{opacity:1}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.15)}
}

/* Интерактив 6: "вылетающие" эмодзи при переключении карточки */
.fly-marker{
  position:absolute;
  left:0;
  top:0;
  pointer-events:none;
  user-select:none;
  will-change:transform,opacity;
  opacity:0;
  font-size:22px;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));
  animation:flyMarker 850ms ease-out both;
}
@keyframes flyMarker{
  0%{opacity:0;transform:translate(0,0) scale(.75) rotate(0deg)}
  12%{opacity:1}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2) rotate(var(--rot))}
}

@media (prefers-reduced-motion: reduce){
  .typing-bubble,.fly-marker{display:none !important}
}
.solution-editor{position:relative;border-radius:10px;overflow:hidden}
.code-wrap:has(.solution-editor),.code-wrap:has(.solution-pre){animation:codeBreathe 6s ease-in-out infinite}
@keyframes codeBreathe{0%,100%{box-shadow:0 0 15px rgba(124,58,237,0.2)}50%{box-shadow:0 0 25px rgba(124,58,237,0.4),0 0 40px rgba(236,72,153,0.2)}}
.solution-pre{margin:0}
.solution-pre code{display:block;padding:12px;font-family:monospace;font-size:11px;line-height:1.5;white-space:pre}
.solution-pre code.solution-bg{background:var(--card2);color:var(--dim);user-select:none}
.solution-pre code.no-hljs{background:var(--card2);color:var(--dim);user-select:none}
.solution-input{position:absolute;inset:0;width:100%;height:100%;padding:12px;border:0;outline:none;background:transparent;color:var(--text);font-family:monospace;font-size:11px;line-height:1.5;resize:none;overflow:auto;caret-color:var(--purple)}
.solution-enter-btn{margin-top:12px;width:100%;background:var(--card2);border:1px solid #ffffff20;color:var(--dim);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.solution-enter-btn:active{transform:scale(.99);background:var(--purple);color:#fff;border-color:var(--purple)}
.edit-toggle{position:fixed;bottom:20px;right:20px;background:var(--card2);border:1px solid #ffffff20;color:var(--dim);width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;transition:.2s}
.edit-toggle.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.edit-field{width:100%;background:var(--card2);color:var(--text);border:1px solid #ffffff20;border-radius:8px;padding:8px;font-size:13px;font-family:monospace;resize:vertical;line-height:1.5;margin-top:6px}
.edit-field:focus{border-color:var(--purple);outline:none}
.edit-label{font-size:11px;color:var(--dim);margin-top:10px;text-transform:uppercase;letter-spacing:.5px}
.edit-save{background:var(--green);color:#000;border:none;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;width:100%}
.edit-save:disabled{opacity:.5;cursor:not-allowed}
.edit-status{text-align:center;font-size:12px;margin-top:8px;min-height:18px}
.token-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.token-box{background:var(--card);border-radius:16px;padding:24px;max-width:360px;width:100%}
.token-box h3{margin-bottom:12px;font-size:16px}
.token-box p{font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.5}
.token-box input{width:100%;padding:10px;border-radius:8px;border:1px solid #ffffff20;background:var(--card2);color:var(--text);font-size:14px;font-family:monospace}
.token-box input:focus{border-color:var(--purple);outline:none}
.token-btns{display:flex;gap:8px;margin-top:14px}
.token-btns button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.token-ok{background:var(--purple);color:#fff}
.token-cancel{background:var(--card2);color:var(--dim)}
.solve-tracker{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 10px;flex-wrap:wrap;-webkit-user-select:none;user-select:none}
.solve-tracker .solve-label{color:var(--dim);font-size:13px}
.solve-btn{width:42px;height:42px;border-radius:12px;border:1px solid #ffffff20;background:var(--card2);color:var(--text);font-size:22px;line-height:1;cursor:pointer;transition:transform .1s,background .15s}
.solve-btn:active{transform:scale(.92);background:var(--purple);color:#fff}
.solve-num{min-width:32px;text-align:center;font-weight:700;font-size:17px;color:var(--green)}
.lc-similar{margin-top:14px;padding-top:12px;border-top:1px solid #ffffff15}
.lc-similar-title{font-size:12px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.lc-similar-links{display:flex;flex-wrap:wrap;gap:8px 14px}
.lc-similar-subtitle{font-size:11px;color:var(--dim);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.45px}
.lc-similar-subtitle:first-of-type{margin-top:0}
.lc-similar-link{color:var(--purple);font-size:13px;text-decoration:underline;text-underline-offset:3px}
.lc-similar-link:active{opacity:.85}
.repo-similar-link{
  display:inline-block;
  margin:0;
  padding:6px 12px;
  border-radius:10px;
  border:1px solid rgba(34,197,94,0.35);
  background:rgba(34,197,94,0.1);
  color:var(--green);
  font-size:13px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  text-align:left;
  transition:background .15s,border-color .15s,transform .1s;
}
.repo-similar-link:hover{background:rgba(34,197,94,0.18);border-color:rgba(34,197,94,0.55)}
.repo-similar-link:active{transform:scale(.98);opacity:.95}

/* ===== DIAGRAM STYLES (сказочный блок — отдельный фон) ===== */
.diagram-wrap{
  margin-top:18px;
  padding:22px 20px 20px;
  position:relative;
  border-radius:20px;
  overflow-x:auto;
  overflow-y:hidden;
  border:1px solid rgba(251,191,36,0.35);
  box-shadow:
    0 0 0 1px rgba(167,139,250,0.25) inset,
    0 4px 24px rgba(91,33,182,0.45),
    0 12px 48px rgba(236,72,153,0.18),
    0 0 80px rgba(251,191,36,0.08);
  background:
    linear-gradient(155deg,
      #1a0a2e 0%,
      #2d1b4e 22%,
      #4c1d95 48%,
      #1e3a5f 78%,
      #0f172a 100%);
}
/* северное сияние + тёплый блик */
.diagram-wrap::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  z-index:0;
  opacity:.95;
  background:
    radial-gradient(ellipse 140% 70% at 50% -30%, rgba(192,132,252,0.45), transparent 55%),
    radial-gradient(ellipse 90% 50% at 100% 80%, rgba(244,114,182,0.28), transparent 50%),
    radial-gradient(ellipse 70% 45% at 0% 90%, rgba(52,211,153,0.12), transparent 45%),
    radial-gradient(ellipse 60% 40% at 85% 15%, rgba(251,191,36,0.2), transparent 40%);
  animation:diagramAurora 14s ease-in-out infinite alternate;
}
/* мелкие «звёзды» */
.diagram-wrap::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  z-index:0;
  opacity:.55;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(255,255,255,0.95) 0.5px, transparent 0.6px),
    radial-gradient(circle at 88% 12%, rgba(255,255,255,0.85) 0.5px, transparent 0.6px),
    radial-gradient(circle at 72% 42%, rgba(255,255,255,0.7) 0.5px, transparent 0.6px),
    radial-gradient(circle at 25% 55%, rgba(253,224,71,0.9) 0.5px, transparent 0.6px),
    radial-gradient(circle at 45% 28%, rgba(255,255,255,0.65) 0.5px, transparent 0.6px),
    radial-gradient(circle at 92% 68%, rgba(255,255,255,0.55) 0.5px, transparent 0.6px),
    radial-gradient(circle at 8% 82%, rgba(255,255,255,0.5) 0.5px, transparent 0.6px),
    radial-gradient(circle at 55% 88%, rgba(196,181,253,0.9) 0.5px, transparent 0.6px);
  animation:diagramTwinkle 5s ease-in-out infinite;
}
@keyframes diagramAurora{
  0%{opacity:.88;filter:hue-rotate(-8deg)}
  100%{opacity:1;filter:hue-rotate(12deg)}
}
@keyframes diagramTwinkle{
  0%,100%{opacity:.45}
  50%{opacity:.72}
}
.diagram-wrap > *{position:relative;z-index:1}

.diagram-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:14px;
  letter-spacing:.06em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(90deg,#fde68a,#fbbf24,#f472b6,#c4b5fd);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.diagram-title::before{
  content:'✨';
  font-size:16px;
  filter:none;
  -webkit-background-clip:unset;
  background-clip:unset;
  color:#fde68a;
  text-shadow:0 0 12px rgba(251,191,36,.8);
}

/* Array visualization */
.arr-vis{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.arr-cell{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--card);border:2px solid #ffffff20;border-radius:8px;font-size:14px;font-weight:600;transition:all .3s ease;position:relative}
.diagram-wrap .arr-cell{background:rgba(15,23,42,0.55);border-color:rgba(226,232,240,0.28);color:#f1f5f9;border-radius:10px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 10px rgba(0,0,0,.25)}
.arr-cell.active{border-color:var(--purple);background:rgba(124,58,237,0.2);transform:scale(1.1)}
.arr-cell.left-ptr{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,0.3)}
.arr-cell.right-ptr{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,158,11,0.3)}
.arr-cell.mid-ptr{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,0.3)}
.arr-cell.window{background:rgba(34,197,94,0.15);border-color:var(--green)}
.arr-cell.found{background:rgba(34,197,94,0.3);border-color:var(--green);animation:pulse .5s ease}
.arr-cell.discarded{opacity:.3;transform:scale(.9)}
.arr-cell .ptr-label{position:absolute;top:-20px;font-size:10px;font-weight:700;white-space:nowrap}
.arr-cell .ptr-label.l{color:var(--green)}
.arr-cell .ptr-label.r{color:var(--orange)}
.arr-cell .ptr-label.m{color:var(--purple)}

/* Stack visualization */
.stack-vis{display:flex;flex-direction:column-reverse;gap:4px;align-items:center;min-height:120px;margin:12px 0}
.stack-cell{min-width:80px;padding:8px 16px;background:var(--card);border:2px solid #ffffff20;border-radius:8px;font-size:14px;font-weight:600;text-align:center;transition:all .3s ease}
.stack-cell.push{animation:stackPush .4s ease}
.stack-cell.pop{animation:stackPop .4s ease}
.stack-cell.top{border-color:var(--purple);background:rgba(124,58,237,0.2)}
.stack-base{width:100px;height:4px;background:var(--dim);border-radius:2px;margin-top:8px}

/* Tree visualization */
.tree-vis{display:flex;flex-direction:column;align-items:center;gap:8px;margin:12px 0}
.tree-row{display:flex;gap:16px;justify-content:center}
.tree-node{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--card);border:2px solid #ffffff20;border-radius:50%;font-size:13px;font-weight:600;transition:all .3s ease;position:relative}
.tree-node.active{border-color:var(--purple);background:rgba(124,58,237,0.2);transform:scale(1.15)}
.tree-node.visited{border-color:var(--green);background:rgba(34,197,94,0.2)}
.tree-node.null{opacity:.3;font-size:10px}
.tree-edge{position:absolute;width:2px;background:#ffffff30;transform-origin:top center}

/* Controls */
.diagram-controls{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap}
.diagram-btn{
  background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(255,255,255,0.06));
  border:1px solid rgba(251,191,36,0.45);
  color:#fef3c7;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:transform .15s,box-shadow .2s,border-color .2s;
  display:flex;
  align-items:center;

<body>

<h1>AlgoCards</h1>

<script charset="UTF-8">
(function(){
  var v=typeof localStorage!=='undefined'?localStorage.getItem('algocards_pq'):'';
  document.write('<script src="problems.js'+(v?'?v='+encodeURIComponent(v):'')+'" charset="UTF-8"><\/script>');

</script>
<script src="theory.js" charset="UTF-8"></script>
<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/==([^=]+)==/g,'<span class="hl">$1</span>')}
function escCode(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// Очень простой stripper для Java/С-стиля комментариев.
// Удаляет //... до конца строки и /* ... */ блоки, сохраняя переносы строк.
function stripCodeComments(src){
  if(!src)return '';
  let out=String(src);
  // Блок-комментарии
  out=out.replace(/\/\*[\s\S]*?\*\//g,'');
  // Однострочные комментарии
  out=out.replace(/(^|[^:])\/\/.*$/gm,'$1');
  return out;
}

// THEORY загружается из theory.js

let currentTheoryPattern = null;
let theoryEditMode = false;

function showTheory(pattern, forceEdit) {
  const t = THEORY[pattern];
  if (!t) return;
  currentTheoryPattern = pattern;
  if (forceEdit !== undefined) theoryEditMode = forceEdit;

  const m = document.getElementById('theoryModal');
  m.style.display = 'flex';

  if (theoryEditMode) {
    m.innerHTML = `
      <div class="theory-box theory-edit-mode">
        <button class="theory-close" onclick="closeTheory()">×</button>
        <button class="theory-edit-toggle" onclick="toggleTheoryEdit()" title="Отменить редактирование">✕</button>
        <div class="theory-subtitle">${pattern}</div>

        <div class="edit-label">Иконка</div>
        <input type="text" class="edit-field theory-edit-field" data-key="icon" value="${t.icon||''}" style="width:60px;text-align:center;font-size:24px">

        <div class="edit-label">Название</div>
        <input type="text" class="edit-field theory-edit-field" data-key="title" value="${escCode(t.title||'')}">

        <div class="edit-label">Описание</div>
        <textarea class="edit-field theory-edit-field" data-key="desc" rows="3">${t.desc||''}</textarea>

        <div class="edit-label">Шаблон кода</div>
        <textarea class="edit-field theory-edit-field" data-key="code" rows="15" style="font-family:monospace;font-size:12px">${t.code||''}</textarea>

        <button class="edit-save" id="saveTheoryBtn" onclick="saveTheory()">💾 Сохранить и запушить</button>
        <div class="edit-status" id="theoryEditStatus"></div>
      </div>
    `;
  } else {
    m.innerHTML = `
      <div class="theory-box">
        <button class="theory-close" onclick="closeTheory()">×</button>
        <button class="theory-edit-toggle" onclick="toggleTheoryEdit()" title="Редактировать">✏️</button>
        <div class="theory-title"><span class="icon">${t.icon}</span> ${t.title}</div>
        <div class="theory-subtitle">${pattern}</div>

        <div class="theory-section">
          <div class="theory-section-title">Описание</div>
          <div class="theory-text">${t.desc}</div>
        </div>

        <div class="theory-section">
          <div class="theory-section-title">Шаблон кода</div>
          <pre class="theory-code"><code class="language-java">${escCode(t.code)}</code></pre>
        </div>
      </div>
    `;
    // Подсветка синтаксиса
    m.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  }
}

function toggleTheoryEdit() {
  const token = getToken();
  if (!theoryEditMode && !token) {
    showTokenModal();
    return;
  }
  theoryEditMode = !theoryEditMode;
  showTheory(currentTheoryPattern);
}

function closeTheory() {
  theoryEditMode = false;
  document.getElementById('theoryModal').style.display = 'none';
}

// Закрытие модала при клике на фон
document.addEventListener('click', function(e) {
  const modal = document.getElementById('theoryModal');
  if (e.target === modal) closeTheory();
});

// --- «14 задач на сегодня» (без поиска) ---
// Из текущего набора (все задачи или выбранный паттерн) каждый календарный день показываем не больше DAILY_LIMIT карточек.
// Состав и порядок детерминированы от строки seed (дата + фильтр), чтобы за день список не менялся между перезагрузками.
// Поиск не ограничиваем — при непустой строке поиска показываются все совпадения из getFiltered().

const DAILY_LIMIT=14;
/** Дата (YYYY-MM-DD), для которой уже собран fcList; если наступил новый день — пересобираем список в renderCard */
let dailyListDateKey='';

/** Локальная календарная дата устройства — ключ «какой сегодня день» для дневной выборки */
function todayLocalDateKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/** FNV-1a: превращаем строку seed в стартовое число для PRNG */
function hashString(s){
  let h=2166136261>>>0;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0}
  return h>>>0;
}

/** Детерминированный генератор [0,1) — нужен для воспроизводимого «перемешивания» по дню */
function mulberry32(seed){
  return function(){
    let t=(seed+=0x6D2B79F5)>>>0;
    t=Math.imul(t^t>>>15,t|1);
    t^=t+Math.imul(t^t>>>7,t|61);
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

/**
 * Берёт из list до maxN задач: Fisher–Yates с PRNG от seedStr.
 * seedStr обычно «дата|all» или «дата|Two Pointers» — отдельная выборка на каждый паттерн в тот же день.
 */
function pickDailyProblems(list,seedStr,maxN){
  if(!list.length)return[];
  const n=Math.min(maxN,list.length);
  const rand=mulberry32(hashString(seedStr));
  const idx=[...Array(list.length).keys()];
  for(let i=idx.length-1;i>0;i--){
    const j=Math.floor(rand()*(i+1));
    const t=idx[i];idx[i]=idx[j];idx[j]=t;
  }
  return idx.slice(0,n).map(i=>list[i]);
}

/** Заполняет fcList дневной порцией. Имеет смысл только при пустом поиске: тогда getFiltered() даёт все задачи или только выбранный паттерн. */
function rebuildDailyList(){
  const k=todayLocalDateKey();
  dailyListDateKey=k;
  fcList=pickDailyProblems(getFiltered(),k+'|'+(activeFilter||'all'),DAILY_LIMIT);
}

function isInTodaysDailyBatch(p){
  if(searchQuery)return false;
  const list=getFiltered();
  const k=todayLocalDateKey()+'|'+(activeFilter||'all');
  const daily=pickDailyProblems(list,k,DAILY_LIMIT);
  return daily.some(x=>x.id===p.id);
}

/** Переход к карточке из этой репы (полный список по паттерну цели; поиск сбрасывается). */
function openRepoSimilarCard(targetId){
  const target=P.find(x=>String(x.id)===String(targetId));
  if(!target)return;
  setMascotTyping(false);
  fcFlipped=false;
  searchQuery='';
  const se=document.getElementById('search');
  if(se)se.value='';
  if(activeFilter!=null&&activeFilter!==target.p){
    activeFilter=target.p;
    renderFilters();
  }
  let list=getFiltered();
  let idx=list.findIndex(x=>String(x.id)===String(targetId));
  if(idx<0){
    activeFilter=null;
    renderFilters();
    list=getFiltered();
    idx=list.findIndex(x=>String(x.id)===String(targetId));
  }
  if(idx<0)return;
  fcList=list;
  fcIdx=idx;
  renderCard();
}

function similarProblemsHtml(p){
  if(!isInTodaysDailyBatch(p))return '';
  let lcBlock='';
  if(Array.isArray(p.lcSimilar)&&p.lcSimilar.length){
    const items=p.lcSimilar.map(x=>{
      const h=(x.h||'').replace(/[^a-z0-9-]/gi,'');
      if(!h)return '';
      const href='https://leetcode.com/problems/'+h+'/';
      const label=(x.n?x.n+'. ':'')+esc(x.t||h);
      return `<a href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" class="lc-similar-link">${label}</a>`;
    }).filter(Boolean).join('');
    if(items) lcBlock=`<div class="lc-similar-subtitle">LeetCode</div><div class="lc-similar-links">${items}</div>`;
  }
  let repoBlock='';
  if(Array.isArray(p.repoSimilar)&&p.repoSimilar.length){
    const repoItems=p.repoSimilar.map(entry=>{
      const rid=typeof entry==='string'?entry:(entry&&entry.id);
      if(!rid)return '';
      const other=P.find(x=>String(x.id)===String(rid));
      if(!other||String(other.id)===String(p.id))return '';
      const label=(typeof entry==='object'&&entry.t)?entry.t:other.t;
      const num=P.indexOf(other)+1;
      // id в одинарных кавычках — иначе JSON.stringify даёт "id" и ломает onclick="...openRepoSimilarCard("
      const safeId=String(rid).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const titleAttr=String(label).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      return `<button type="button" class="repo-similar-link" title="${titleAttr}" onclick="event.stopPropagation();openRepoSimilarCard('${safeId}')">#${num} ${esc(label)}</button>`;
    }).filter(Boolean).join('');
    if(repoItems) repoBlock=`<div class="lc-similar-subtitle">В этой коллекции</div><div class="lc-similar-links">${repoItems}</div>`;
  }
  if(!lcBlock&&!repoBlock)return '';
  return `<div class="lc-similar" onclick="event.stopPropagation()">
    <div class="lc-similar-title">Похожие задачи</div>
    ${lcBlock}
    ${repoBlock}
  </div>`;
}

// ===== DIAGRAM SYSTEM =====
let diagramState = {}; // {problemId: currentStep}

function getDiagramStep(pid) {
  return diagramState[pid] || 0;
}

function setDiagramStep(pid, step) {
  diagramState[pid] = step;
  renderCard();
}

function diagramHtml(p) {
  if (!p.diagram) return '';
  const d = p.diagram;
  const step = getDiagramStep(p.id);
  const maxStep = (d.steps?.length || 1) - 1;
  const currentStep = d.steps?.[step] || d.steps?.[0];

  let content = '';

  if (d.type === 'array') {
    content = renderArrayDiagram(d, currentStep);
  } else if (d.type === 'twoptr') {
    content = renderTwoPtrDiagram(d, currentStep);
  } else if (d.type === 'window') {
    content = renderWindowDiagram(d, currentStep);
  } else if (d.type === 'stack') {
    content = renderStackDiagram(d, currentStep);
  } else if (d.type === 'tree') {
    content = renderTreeDiagram(d, currentStep);
  } else if (d.type === 'bsearch') {
    content = renderBSearchDiagram(d, currentStep);
  } else if (d.type === 'multi') {
    content = renderMultiDiagram(d, currentStep);
  } else if (d.type === 'cartesian') {
    content = renderCartesianDiagram(d, currentStep);
  }

  const controls = d.steps && d.steps.length > 1 ? `
    <div class="diagram-controls" onclick="event.stopPropagation()">
      <button class="diagram-btn" onclick="setDiagramStep('${p.id}', ${Math.max(0, step-1)})" ${step===0?'disabled':''}>← Назад</button>
      <span class="diagram-step">${step+1} / ${d.steps.length}</span>
      <button class="diagram-btn" onclick="setDiagramStep('${p.id}', ${Math.min(maxStep, step+1)})" ${step===maxStep?'disabled':''}>Далее →</button>
    </div>
  ` : '';

  const desc = currentStep?.desc ? `<div class="diagram-desc">${esc(currentStep.desc).replace(/\*\*([^*]+)\*\*/g,'<span class="hl">$1</span>')}</div>` : '';

  return `
    <div class="diagram-wrap" onclick="event.stopPropagation()">
      <div class="diagram-title">Визуализация алгоритма</div>
      ${content}
      ${desc}
      ${controls}
    </div>
  `;
}

function renderArrayDiagram(d, step) {
  const arr = d.data || [];
  const active = step?.active || [];
  const labels = step?.labels || {};

  const cells = arr.map((v, i) => {
    let cls = 'arr-cell';
    if (active.includes(i)) cls += ' active';
    let label = '';
    for (const [k, idx] of Object.entries(labels)) {
      if (idx === i) label = `<span class="ptr-label">${k}</span>`;
    }
    return `<div class="${cls}">${label}${v}</div>`;
  }).join('');

  return `<div class="arr-vis">${cells}</div>`;
}

function renderTwoPtrDiagram(d, step) {
  const arr = d.data || [];
  const l = step?.l ?? 0;
  const r = step?.r ?? arr.length - 1;
  const found = step?.found || [];

  const cells = arr.map((v, i) => {
    let cls = 'arr-cell';
    let label = '';
    if (i === l) { cls += ' left-ptr'; label = '<span class="ptr-label l">L</span>'; }
    if (i === r) { cls += ' right-ptr'; label += '<span class="ptr-label r">R</span>'; }
    if (found.includes(i)) cls += ' found';
    return `<div class="${cls}">${label}${v}</div>`;
  }).join('');

  return `<div class="arr-vis">${cells}</div>`;
}

function renderWindowDiagram(d, step) {
  const arr = d.data || [];
  const wl = step?.wl ?? 0;
  const wr = step?.wr ?? 0;

  const cells = arr.map((v, i) => {
    let cls = 'arr-cell';
    let label = '';
    if (i >= wl && i <= wr) cls += ' window';
    if (i === wl) label = '<span class="ptr-label l">L</span>';
    if (i === wr) label += '<span class="ptr-label r">R</span>';
    return `<div class="${cls}">${label}${v}</div>`;
  }).join('');

  return `<div class="arr-vis">${cells}</div>`;
}

function renderBSearchDiagram(d, step) {
  const arr = d.data || [];
  const l = step?.l ?? 0;
  const r = step?.r ?? arr.length - 1;
  const m = step?.m ?? Math.floor((l + r) / 2);
  const found = step?.found;

  const cells = arr.map((v, i) => {
    let cls = 'arr-cell';
    let label = '';
    if (i < l || i > r) cls += ' discarded';
    if (i === l) label = '<span class="ptr-label l">L</span>';
    if (i === r) label += '<span class="ptr-label r">R</span>';
    if (i === m) { cls += ' mid-ptr'; label += '<span class="ptr-label m">M</span>'; }
    if (found === i) cls += ' found';
    return `<div class="${cls}">${label}${v}</div>`;
  }).join('');

  return `<div class="arr-vis">${cells}</div>`;
}

function renderStackDiagram(d, step) {
  const stack = step?.stack || [];
  const top = step?.top;

  const cells = stack.map((v, i) => {
    let cls = 'stack-cell';
    if (i === stack.length - 1) cls += ' top';
    return `<div class="${cls}">${v}</div>`;
  }).join('');

  return `<div class="stack-vis">${cells}<div class="stack-base"></div></div>`;
}

function renderTreeDiagram(d, step) {
  const nodes = d.data || [];
  const active = step?.active || [];
  const visited = step?.visited || [];

  // Simple binary tree layout (levels)
  let html = '<div class="tree-vis">';
  let idx = 0;
  let level = 1;
  while (idx < nodes.length) {
    const count = Math.min(level, nodes.length - idx);
    html += '<div class="tree-row">';
    for (let i = 0; i < count && idx < nodes.length; i++, idx++) {
      const v = nodes[idx];
      let cls = 'tree-node';
      if (v === null) cls += ' null';
      if (active.includes(idx)) cls += ' active';
      if (visited.includes(idx)) cls += ' visited';
      html += `<div class="${cls}">${v === null ? '∅' : v}</div>`;
    }
    html += '</div>';
    level *= 2;
  }
  html += '</div>';
  return html;
}

function renderMultiDiagram(d, step) {
  const structs = step?.structs || [];
  let html = '<div class="multi-vis">';

  for (const s of structs) {
    html += `<div class="struct-block">`;
    html += `<div class="struct-label"><span class="type">${s.type || ''}</span> ${s.name || ''}</div>`;
    html += `<div class="struct-row">`;

    if (Array.isArray(s.data)) {
      for (let i = 0; i < s.data.length; i++) {
        const v = s.data[i];
        let cls = 'struct-item';
        if (s.hl?.includes(i)) cls += ' hl';
        if (s.active?.includes(i)) cls += ' active';
        html += `<div class="${cls}">${v}</div>`;
      }
    } else if (typeof s.data === 'object') {
      // key-value map
      for (const [k, v] of Object.entries(s.data)) {
        html += `<div class="struct-item struct-kv"><span class="struct-key">${k}</span><span class="struct-arrow">→</span><span class="struct-val">${v}</span></div>`;
      }
    } else {
      html += `<div class="struct-item">${s.data}</div>`;
    }

    html += `</div></div>`;
  }

  html += '</div>';
  return html;
}

function renderCartesianDiagram(d, step){
  const input=Array.isArray(d.input)?d.input:[];
  const activeArr=step?.activeArr ?? -1;
  const activeVal=step?.activeVal ?? -1;
  const idx=step?.idx ?? 0;
  const current=Array.isArray(step?.current)?step.current:[];
  const result=Array.isArray(step?.result)?step.result:[];

  const inputHtml=input.map((arr,arrIdx)=>{
    const vals=(Array.isArray(arr)?arr:[]).map((v,valIdx)=>{
      const cls='cart-val'+((arrIdx===activeArr && valIdx===activeVal)?' active':'');
      return `<span class="${cls}">${esc(String(v))}</span>`;
    }).join('');
    return `<div class="cart-input-row">
      <span class="cart-input-label">arrays[${arrIdx}] =</span>
      <div class="cart-arr">${vals}</div>
    </div>`;
  }).join('');

  const currentHtml=current.length
    ? current.map(v=>`<span class="cart-chip">${esc(String(v))}</span>`).join('')
    : '<span class="cart-chip">[]</span>';

  const resultHtml=result.length
    ? result.map(r=>`<div class="cart-result">[${(Array.isArray(r)?r:[]).map(x=>esc(String(x))).join(', ')}]</div>`).join('')
    : '<div class="cart-result">пока пусто</div>';

  return `<div class="cart-vis">
    <div class="cart-input-title">Вход: массив массивов</div>
    ${inputHtml}
    <div class="cart-state">
      <div class="cart-box">
        <div class="cart-box-title">Текущее состояние рекурсии</div>
        <div class="cart-chip-row">
          <span class="cart-chip idx">idx=${idx}</span>
          ${currentHtml}
        </div>
      </div>
      <div class="cart-box">
        <div class="cart-box-title">Уже собранные комбинации</div>
        <div class="cart-results">${resultHtml}</div>
      </div>
    </div>
  </div>`;
}

function setupSwipeNav(){
  if(editMode)return;
  const card=document.querySelector('#cardsArea .flashcard');
  if(!card)return;

  // на каждый render навешиваем заново, но чтобы не размножать — очищаем обработчики через замену слушателя не делаем,
  // т.к. рендер создаёт новый DOM и старые коллбеки теряются.

  let startX=0, startY=0, startT=0;
  const SWIPE_PX=70;
  const DY_RATIO=1.25;
  const MAX_DT=700;
  // Тайтовые пороги для touch часто не проходят (палец мягче двигается и датчики скорости другие).
  const SWIPE_PX_TOUCH=45;
  const DY_RATIO_TOUCH=1.05;
  const MAX_DT_TOUCH=1050;

  function shouldIgnoreTarget(target){
    if(!target)return true;
    if(document.querySelector('#cardsArea textarea.solution-input'))return true;
    if(target.closest && target.closest('textarea.solution-input'))return true;
    if(target.closest && target.closest('button, a'))return true;
    if(target.closest && target.closest('.code-wrap, pre, code, .solution-pre, .solution-editor'))return true;
    return false;
  }

  card.addEventListener('pointerdown',(e)=>{
    if(e.pointerType==='mouse' && e.button!==0)return;
    if(shouldIgnoreTarget(e.target))return;
    startX=e.clientX;startY=e.clientY;startT=Date.now();
  },{passive:true});

  card.addEventListener('pointerup',(e)=>{
    if(!startT)return;
    const dx=e.clientX-startX;
    const dy=e.clientY-startY;
    const dt=Date.now()-startT;
    startT=0;

    if(Math.abs(dx)>=SWIPE_PX && Math.abs(dx)>(Math.abs(dy)*DY_RATIO) && dt<=MAX_DT){
      lastSwipeAt=Date.now();
      if(dx<0){
        spawnFlyMarker('right', card);
        fcNext();
      } else {
        spawnFlyMarker('left', card);
        fcPrev();
      }
    }
  },{passive:true});

  // Touch-обработка (iOS/некоторые Android иногда хуже отрабатывают pointer events).
  card.addEventListener('touchstart',(e)=>{
    if(shouldIgnoreTarget(e.target))return;
    if(!e.touches || !e.touches.length)return;
    const t=e.touches[0];
    startX=t.clientX; startY=t.clientY; startT=Date.now();
  },{passive:true});

  card.addEventListener('touchend',(e)=>{
    if(!startT)return;
    // На touchend используем startY/startX, текущие координаты не обязательны — dx/dy считаем по последней дельте.
    // Если touchcancel/scroll сорвёт жест — startT сбросится по touchcancel ниже.
    const dt=Date.now()-startT;
    startT=0;
    // touchend часто не даёт clientX/clientY в end-объекте так, как pointerup, поэтому берём last touch координату из changedTouches.
    const c = e.changedTouches && e.changedTouches.length ? e.changedTouches[0] : null;
    if(!c)return;
    const dx=c.clientX-startX;
    const dy=c.clientY-startY;

    if(Math.abs(dx)>=SWIPE_PX_TOUCH && Math.abs(dx)>(Math.abs(dy)*DY_RATIO_TOUCH) && dt<=MAX_DT_TOUCH){
      lastSwipeAt=Date.now();
      if(dx<0){
        spawnFlyMarker('right', card);
        fcNext();
      } else {
        spawnFlyMarker('left', card);
        fcPrev();
      }
    }
  },{passive:true});

  card.addEventListener('touchcancel',()=>{
    startT=0;
  },{passive:true});

  card.addEventListener('click',(e)=>{
    if(Date.now()-lastSwipeAt<450)return;
    // не переворачивать при клике по ссылкам/кнопкам и блоку похожих задач
    const t=e.target;
    if(t&&t.closest&&(t.closest('button,a,.lc-similar')||t.closest('textarea')))return;
    flipCard();
  });
}

function mascotProfileFor(problemId){
  const h=hashString(String(problemId));
  // разные карты = разные профили поведения питомцев
  const inputInterval=450 + (h%550); // 450..999
  const readInterval=1100 + (h%900); // 1100..1999
  const extraSpawnProb=0.12 + ((h>>3)%20)/100; // 0.12..0.31
  const catBias=((h>>7)&1)?1:-1;

  const catW=0.25 + ((h>>2)%35)/100; // 0.25..0.60
  const birdW=0.20 + ((h>>4)%25)/100; // 0.20..0.45
  const buttW=0.20 + ((h>>6)%25)/100; // 0.20..0.45

  // длительности анимаций тоже разные, чтобы визуально отличалось
  const durBird=2.2 + (h%80)/100; // 2.2..3.0
  const durButterfly=2.5 + ((h>>1)%90)/100; // 2.5..3.4
  const durCat=2.8 + ((h>>5)%120)/100; // 2.8..4.0

  return {
    inputInterval,
    readInterval,
    extraSpawnProb,
    catBias,
    catW,
    birdW,
    buttW,
    durBird,
    durButterfly,
    durCat,
    sizeJitter:0.85 + ((h>>9)%40)/100 // 0.85..1.25
  };
}

function spawnMascot(){
  const layer=document.getElementById('mascotLayer');
  if(!layer)return;
  const existing=layer.querySelectorAll('.mascot');
  if(existing.length>=12)return;
  const p=fcList[fcIdx];
  if(!p)return;
  if(!mascotProfile)setMascotProfile(p);
  const prof=mascotProfile||mascotProfileFor(p.id);
  const hashVal=hashString(String(p.id));

  // Разные эмодзи, но с разной “профильной” вероятностью по карточке.
  const butterflyEmojis=[
    {t:'🦋',cls:'mascot-butterfly'},
    {t:'🪲',cls:'mascot-butterfly'}
  ];
  const birdEmojis=[
    {t:'🐦',cls:'mascot-bird'},
    {t:'🐧',cls:'mascot-bird'},
    {t:'🦅',cls:'mascot-bird'}
  ];
  const catEmojis=[
    {t:'🐱',cls:'mascot-cat'},
    {t:'🐈',cls:'mascot-cat'},
    {t:'🐅',cls:'mascot-cat'}
  ];

  // Вес внутри карточки зависит от problemId, а не только от рандома.
  const hMix=(hashVal%1000)/1000;
  let pickType;
  if(mascotTyping){
    // при вводе чаще котики
    const wCat=0.55 + prof.catW*0.35;
    const wBird=0.30 + prof.birdW*0.20;
    const wBf=1 - wCat - wBird;
    const r=Math.random();
    pickType = r < wCat ? 'cat' : (r < wCat+wBird ? 'bird' : 'butterfly');
  } else if(fcFlipped){
    // на обороте (но без ввода) чаще птички/жучки
    const wBird=0.45 + prof.birdW*0.25;
    const wBf=0.40 + prof.buttW*0.20;
    const wCat=1 - wBird - wBf;
    const r=Math.random();
    pickType = r < wBird ? 'bird' : (r < wBird+wBf ? 'butterfly' : 'cat');
  } else {
    // на фронте (читаешь условие) чаще бабочки
    const wBf=0.55 + prof.buttW*0.25;
    const wBird=0.35 + prof.birdW*0.15;
    const wCat=1 - wBf - wBird;
    const r=Math.random();
    pickType = r < wBf ? 'butterfly' : (r < wBf+wBird ? 'bird' : 'cat');
  }

  let pickList=butterflyEmojis;
  let animDur=prof.durButterfly;
  if(pickType==='bird'){
    pickList=birdEmojis;
    animDur=prof.durBird;
  } else if(pickType==='cat'){
    pickList=catEmojis;
    animDur=prof.durCat;
  }

  const variantIdx=(hashVal + existing.length + Math.floor(hMix*10))%pickList.length;
  const pick=pickList[variantIdx];

  const el=document.createElement('span');
  el.className='mascot '+pick.cls;
  el.textContent=pick.t;
  el.style.animationDuration=animDur+'s';
  const fontScale=prof.sizeJitter;
  el.style.fontSize=(30*fontScale)+'px';

  const rect=layer.getBoundingClientRect();
  const w=rect.width||300;
  const height=rect.height||220;
  // стартовые точки и траектория тоже меняются по карточке
  const x=Math.floor((0.05 + (hashVal%20)/100)*w + Math.random()*(w*0.20));
  const y=Math.floor((0.08 + ((hashVal>>3)%20)/100)*height + Math.random()*(height*0.22));

  const sign = (pickType==='cat'?prof.catBias:1) * (Math.random()<0.5?1:-1);
  const dxAmp = w * (0.12 + (pickType==='bird'?prof.birdW:pickType==='butterfly'?prof.buttW:prof.catW)*0.25);
  const dyAmp = height * (0.15 + (pickType==='bird'?prof.birdW:pickType==='butterfly'?prof.buttW:prof.catW)*0.25);

  const dx=Math.floor(sign*Math.random()*dxAmp);
  const dy=Math.floor((Math.random()*2-1)*dyAmp);
  const dx2=dx + Math.floor(sign*Math.random()*w*(0.08 + prof.catW*0.10));

  el.style.setProperty('--x', x+'px');
  el.style.setProperty('--y', y+'px');
  el.style.setProperty('--dx', dx+'px');
  el.style.setProperty('--dy', dy+'px');
  el.style.setProperty('--dx2', dx2+'px');

  layer.appendChild(el);
  el.addEventListener('animationend',()=>{ try{el.remove();}catch(e){} },{once:true});
}

  const y=(r.top-lr.top)+r.height*(0.18+Math.random()*0.64);

  const el=document.createElement('span');
  el.className='typing-bubble';
  el.textContent=bubbleEmojis[Math.floor(Math.random()*bubbleEmojis.length)];

  const dx=(Math.random()*2-1)*30;
  const dy=-(50+Math.random()*85);
  const dur=0.9+Math.random()*0.7;
  const z=0.8+Math.random()*0.35;

  el.style.left=Math.floor(x)+'px';
  el.style.top=Math.floor(y)+'px';
  el.style.animationDuration=dur+'s';
  el.style.opacity=String(z);
  el.style.setProperty('--dx', dx+'px');
  el.style.setProperty('--dy', dy+'px');

  layer.appendChild(el);
  el.addEventListener('animationend',()=>{ try{el.remove();}catch(e){} },{once:true});
}

// Интерактив 6: "летящие" эмодзи при навигации по карточкам.
function spawnFlyMarker(dir, anchorEl){
  const overlay=document.getElementById('flyOverlay');
  if(!overlay)return;
  if(editMode)return;

  const existing=overlay.querySelectorAll('.fly-marker').length;
  if(existing>=8)return;

  const emojis=dir==='right'
    ? ['🚀','✨','⚡️','🧩']
    : ['🔙','⏪','🌪️','✨'];

  // overlay фиксированный к viewport, значит r.left/r.top уже подходят как координаты для left/top
  let baseX=window.innerWidth*0.5;
  let baseY=window.innerHeight*0.22;

  if(anchorEl && anchorEl.getBoundingClientRect){
    const r=anchorEl.getBoundingClientRect();
    baseX=r.left + r.width/2;
    baseY=r.top + r.height/2;
  }

  const count=3;
  for(let i=0;i<count;i++){
    const el=document.createElement('span');
    el.className='fly-marker';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];

    const x=baseX + (Math.random()*40-20);
    const y=baseY + (Math.random()*20-10);
    const dx=(dir==='right'?1:-1)*(70+Math.random()*140);
    const dy=-(45+Math.random()*95);
    const rot=(Math.random()*70-35)*(dir==='right'?1:-1);
    const dur=0.7+Math.random()*0.35;

    el.style.left=Math.floor(x)+'px';
    el.style.top=Math.floor(y)+'px';
    el.style.animationDuration=dur+'s';
    el.style.setProperty('--dx', dx+'px');
    el.style.setProperty('--dy', dy+'px');
    el.style.setProperty('--rot', rot+'deg');

    overlay.appendChild(el);
    el.addEventListener('animationend',()=>{ try{el.remove();}catch(e){} },{once:true});
  }
}

function setupMascots(){
  if(editMode){stopMascots();return;}
  const layer=document.getElementById('mascotLayer');
  if(!layer){stopMascots();return;}
  stopMascots();

  // Если пишет — чаще, если читаешь — реже
  let interval=1400;
  const prof=mascotProfile||{};
  if(mascotTyping)interval=prof.inputInterval||650;
  else interval=fcFlipped?(prof.readInterval?Math.floor(prof.readInterval*0.92):1050):(prof.readInterval||1500);

  mascotTimer=setInterval(()=>{
    if(mascotTyping && Math.random()<0.65)spawnTypingBubbles();
    // Иногда подкидываем по 2 “питомца”, чтобы было веселее
    spawnMascot();
    if(!mascotTyping && Math.random()<(prof.extraSpawnProb||0.2))spawnMascot();
  }, interval);
}

function solutionInputKey(problemId, which){
  return 'algocards_solution_input_'+problemId+'_'+which;
}
function loadSolutionInput(problemId, which){
  try{
    const raw=localStorage.getItem(solutionInputKey(problemId, which));
    return typeof raw==='string'?raw:'';
  }catch(e){
    return '';
  }
}
function saveSolutionDraft(textarea){
  const pid=textarea.dataset.problemId;
  const which=textarea.dataset.which;
  if(!pid||!which)return;
  try{localStorage.setItem(solutionInputKey(pid, which), textarea.value);}catch(e){}
}
function isSolutionInputOpen(problemId, which){
  return !!(solutionInputOpen[problemId] && solutionInputOpen[problemId][which]);
}
function openSolutionInput(which){
  const p=fcList[fcIdx];
  if(!p)return;
  if(isSolutionInputOpen(p.id, which)){
    solutionInputOpen[p.id][which]=false;
    renderCard();
    setMascotTyping(false);
    return;
  }
  if(!solutionInputOpen[p.id])solutionInputOpen[p.id]={};
  solutionInputOpen[p.id][which]=true;
  renderCard();
  setTimeout(()=>{
    const el=document.getElementById('solutionInput_'+p.id+'_'+which);
    if(!el)return;
    el.focus();
    const v=el.value||'';
    try{el.setSelectionRange(v.length, v.length);}catch(e){}
    setMascotTyping(true);
  },0);
}

function copyProblemBundle(btn){
  const p=fcList[fcIdx];

  const sel=window.getSelection?window.getSelection().toString().trim():'';

      btn.textContent='Copied ✓';
      btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1500);
    }).catch(()=>{btn.textContent='Error'});
    return;
  }
  const num=P.indexOf(p)+1;
  const parts=['#'+num+' '+p.t,'','Условие:',p.desc||'','','Решение:',p.code||''];
  if(p.code2){
    parts.push('','Решение 2 (HashMap, O(n)):');
    parts.push(p.code2);
  }
  const text=parts.join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied ✓';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1500);
  }).catch(()=>{btn.textContent='Error'});
}

function buildProblemsJs(){
  const escVal=s=>{
    if(s==null)return '';
    return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  };
  let out='const P = [\n';
  let prevPat='';
  P.forEach((p,i)=>{
    if(p.p!==prevPat){
      out+='// ===== '+p.p.toUpperCase()+' =====\n';
      prevPat=p.p;
    }
    out+='{id:"'+p.id+'",t:"'+p.t.replace(/"/g,'\\"')+'",p:"'+p.p.replace(/"/g,'\\"')+'",d:"'+p.d.replace(/"/g,'\\"')+'",\n';
    out+='desc:`'+escVal(p.desc)+'`,\n';
    out+='hint:`'+escVal(p.hint)+'`,\n';
    out+='code:`'+escVal(p.code)+'`,\n';
    if(p.code2)out+='code2:`'+escVal(p.code2)+'`,\n';
    out+='steps:`'+escVal(p.steps)+'`,\n';
    out+='complexity:`'+escVal(p.complexity)+'`,\n';
    out+='complexityExpl:`'+escVal(p.complexityExpl)+'`,\n';
    out+='expl:`'+escVal(p.expl)+'`';
    if(Array.isArray(p.lcSimilar)&&p.lcSimilar.length)out+=',\nlcSimilar:'+JSON.stringify(p.lcSimilar);
    if(Array.isArray(p.repoSimilar)&&p.repoSimilar.length)out+=',\nrepoSimilar:'+JSON.stringify(p.repoSimilar);
    // Иначе при пуше из редактора пропадают все diagram:{...} в problems.js
    if(p.diagram!=null&&typeof p.diagram==='object')out+=',\ndiagram:'+JSON.stringify(p.diagram);
    out+='}';
    if(i<P.length-1)out+=',';
    out+='\n\n';
  });
  out+='];\n';
  return out;
}

async function purgeProblemsJsFromCaches(){
  if(!('caches'in window))return;
  const names=await caches.keys();
  await Promise.all(names.map(async name=>{
    const c=await caches.open(name);
    const reqs=await c.keys();
    await Promise.all(reqs.map(r=>{
      if((r.url||'').includes('problems.js'))return c.delete(r);
    }));
  }));
}

async function saveCard(){
  const p=fcList[fcIdx];
  const btn=document.getElementById('saveBtn');
  const status=document.getElementById('editStatus');
  
  document.querySelectorAll('.edit-field').forEach(el=>{
    p[el.dataset.key]=el.value;
  });

  btn.disabled=true;
  status.style.color='var(--dim)';
  status.textContent='Генерация файла...';

  const content=buildProblemsJs();
  const encoded=btoa(unescape(encodeURIComponent(content)));
  
  status.textContent='Получение SHA текущего файла...';
  const token=getToken();
  
  try{
    const meta=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`,{
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
    });
    if(!meta.ok){
      if(meta.status===401){
        status.style.color='var(--red)';
        status.textContent='Неверный токен. Нажмите ✏️ чтобы обновить.';
        localStorage.removeItem('gh_token');
        editMode=false;
        const editToggle=document.getElementById('editToggle');
        if(editToggle) editToggle.classList.remove('active');
        renderCard(); // выходим из режима редактирования
        btn.disabled=false;
        return;
      }
      throw new Error('GitHub API: '+meta.status);
    }
    const metaJson=await meta.json();
    const sha=metaJson.sha;

    status.textContent='Пушим в GitHub...';
    const put=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({
        message:'Update '+p.id+': '+p.t,
        content:encoded,
        sha:sha
      })
    });
    
    if(!put.ok){
      const err=await put.json();
      throw new Error(err.message||'PUT failed: '+put.status);
    }

    localStorage.setItem('algocards_pq',String(Date.now()));
    await purgeProblemsJsFromCaches();

    status.style.color='var(--green)';
    status.textContent='✅ Запушено!';
    btn.disabled=false;

    // После успешного пуша выходим из режима редактирования
    editMode=false;
    const editToggle=document.getElementById('editToggle');
    if(editToggle) editToggle.classList.remove('active');
    renderCard();
  }catch(e){
    status.style.color='var(--red)';
    status.textContent='❌ '+e.message;
    btn.disabled=false;
  }
}

function buildTheoryJs(){
  const escVal=s=>{
    if(s==null)return '';
    return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  };
  let out='const THEORY = {\n';
  const keys=Object.keys(THEORY);
  keys.forEach((k,i)=>{
    const t=THEORY[k];
    out+=`  '${k}': {\n`;
    out+=`    icon: '${t.icon||''}',\n`;
    out+=`    title: '${(t.title||'').replace(/'/g,"\\'")}',\n`;
    out+=`    desc: '${(t.desc||'').replace(/'/g,"\\'")}',\n`;
    out+=`    code: \`${escVal(t.code)}\`\n`;
    out+='  }';
    if(i<keys.length-1)out+=',';
    out+='\n';
  });
  out+='};\n';
  return out;
}

  });

  btn.disabled=true;
  status.style.color='var(--dim)';
  status.textContent='Генерация файла...';

  const content=buildTheoryJs();
  const encoded=btoa(unescape(encodeURIComponent(content)));

  status.textContent='Получение SHA текущего файла...';
  const token=getToken();

  try{
    const meta=await fetch(`https://api.github.com/repos/${REPO}/contents/${THEORY_FILE_PATH}`,{
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
    });
    if(!meta.ok){
      if(meta.status===401){
        status.style.color='var(--red)';
        status.textContent='Неверный токен. Нажмите ✏️ чтобы обновить.';
        localStorage.removeItem('gh_token');
        editMode=false;
        const editToggle=document.getElementById('editToggle');
        if(editToggle) editToggle.classList.remove('active');
        theoryEditMode=false;
        renderCard();
        showTheory(pattern);
        btn.disabled=false;
        return;
      }
      throw new Error('GitHub API: '+meta.status);
    }
    const metaJson=await meta.json();
    const sha=metaJson.sha;

    status.textContent='Пушим в GitHub...';
    const put=await fetch(`https://api.github.com/repos/${REPO}/contents/${THEORY_FILE_PATH}`,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({
        message:'Update theory: '+pattern,
        content:encoded,
        sha:sha
      })
    });

    if(!put.ok){
      const err=await put.json();
      throw new Error(err.message||'PUT failed: '+put.status);
    }

    await purgeTheoryJsFromCaches();

    status.style.color='var(--green)';
    status.textContent='✅ Запушено!';
    btn.disabled=false;

    // После успешного пуша выходим из режима редактирования теории
    theoryEditMode=false;
    showTheory(pattern);
  }catch(e){
    status.style.color='var(--red)';
    status.textContent='❌ '+e.message;
    btn.disabled=false;
  }
}

renderFilters();
rebuildDailyList(); // старт: fcList = до 14 задач на сегодня (или все, если в наборе меньше)
renderCard();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
